document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

14px; padding:14px 16px; min-width:230px;\">\n    <div style=\"font-size:12px; font-weight:800; letter-spacing:1.5px; color:#8d97b5; margin-bottom:10px;\">ROBOTLAR<\u002Fdiv>\n    <div style=\"display:flex; flex-direction:column; gap:8px;\">\n      <sc-for list=\"{{ statuses }}\" as=\"s\" hint-placeholder-count=\"6\">\n        <div style=\"display:flex; align-items:center; gap:9px;\">\n          <span style=\"width:9px; height:9px; border-radius:50%; background:{{ s.accent }}; box-shadow:0 0 6px {{ s.accent }};\"><\u002Fspan>\n          <span style=\"color:#e9edf7; font-size:13px; font-weight:600; width:104px;\">{{ s.label }}<\u002Fspan>\n          <span style=\"color:#8d97b5; font-size:12.5px;\">{{ s.txt }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;autoPilot&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Simulyatsiya&quot;},\n  &quot;speed&quot;: {&quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 1, &quot;min&quot;: 0.5, &quot;max&quot;: 3, &quot;step&quot;: 0.1, &quot;unit&quot;: &quot;x&quot;, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Simulyatsiya&quot;},\n  &quot;showColliders&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Debug&quot;}\n}\">\nclass Component extends DCLogic {\n  state = { ready: false, statuses: [], mode: 'work' };\n\n  async componentDidMount() {\n    const m = (function(){\n// Kabir AI Office — modular layout builder.\n// Rooms are config-driven components assembled from shared /assets SVGs.\n// Xona qo'shish: ROOMS yoki SPECIAL ga bitta konfiguratsiya qatori qo'shing —\n// grid, sahna o'lchami, devorlar va collision avtomatik hisoblanadi.\nconst HX = 32, HY = 16;\nconst P = (x, y) => [ORX + (x - y) * HX, ORY + (x + y) * HY];\nconst isoC = (x, y) => [ORX + (x - y) * HX + 32, ORY + (x + y) * HY + 16];\n\nconst A = {\n  wallH: { src: 'assets/wall_h.svg', w: 64, h: 78 },\n  wallV: { src: 'assets/wall_v.svg', w: 64, h: 78 },\n  wallC: { src: 'assets/wall_c.svg', w: 64, h: 78 },\n  floor: { src: 'assets/floor.svg', w: 64, h: 32 },\n  hall: { src: 'assets/floor_hall.svg', w: 64, h: 32 },\n  doorGlow: { src: 'assets/floor_door.svg', w: 64, h: 32 },\n  wall: { src: 'assets/wall.svg', w: 64, h: 84 },\n  door: { src: 'assets/door.svg', w: 64, h: 84 },\n  desk: { src: 'assets/desk.svg', w: 128, h: 92 },\n  shelf: { src: 'assets/bookshelf.svg', w: 96, h: 106 },\n  chair: { src: 'assets/chair.svg', w: 40, h: 54 },\n  monitor: { src: 'assets/monitor.svg', w: 40, h: 42 },\n  kb: { src: 'assets/keyboard.svg', w: 32, h: 18 },\n  mug: { src: 'assets/coffee.svg', w: 16, h: 20 },\n  plant: { src: 'assets/plant.svg', w: 36, h: 52 },\n  table: { src: 'assets/table.svg', w: 192, h: 130 },\n  sofa: { src: 'assets/sofa.svg', w: 128, h: 100 },\n  machine: { src: 'assets/coffee_machine.svg', w: 48, h: 66 },\n  server: { src: 'assets/server.svg', w: 64, h: 100 },\n  screen: { src: 'assets/screen.svg', w: 128, h: 120 },\n};\n\nconst ROOMS = [\n  { key: 'DataBotOffice', bot: 'Data', label: 'DATA BOT OFISI', x: 0, y: 0, w: 9, h: 8, side: 'L', accent: '#4dc3ff' },\n  { key: 'ResearchBotOffice', bot: 'Research', label: 'RESEARCH BOT OFISI', x: 0, y: 9, w: 9, h: 8, side: 'L', accent: '#b79bff' },\n  { key: 'FinanceBotOffice', bot: 'Finance', label: 'FINANCE BOT OFISI', x: 0, y: 18, w: 9, h: 8, side: 'L', accent: '#ffd166' },\n  { key: 'DevBotOffice', bot: 'Dev', label: 'DEV BOT OFISI', x: 23, y: 0, w: 9, h: 8, side: 'R', accent: '#5be584' },\n  { key: 'DesignBotOffice', bot: 'Design', label: 'DESIGN BOT OFISI', x: 23, y: 9, w: 9, h: 8, side: 'R', accent: '#ff8fd0' },\n  { key: 'MarketingBotOffice', bot: 'Marketing', label: 'MARKETING BOT OFISI', x: 23, y: 18, w: 9, h: 8, side: 'R', accent: '#ff8a66' },\n];\n\nconst SPECIAL = {\n  meeting: { x: 11, y: 0, w: 10, h: 8 },\n  lobby: { x: 11, y: 9, w: 10, h: 9 },\n  coffee: { x: 11, y: 19, w: 5, h: 9 },\n  server: { x: 16, y: 19, w: 5, h: 9 },\n};\n\nconst EXTENTS = [...ROOMS, ...Object.values(SPECIAL)];\nconst GW = Math.max(...EXTENTS.map(r => r.x + r.w));\nconst GH = Math.max(...EXTENTS.map(r => r.y + r.h));\nconst ORX = (GH - 1) * HX + 16, ORY = 90;\nconst STAGE_W = ORX + GW * HX + 48;\nconst STAGE_H = ORY + (GW + GH - 2) * HY + 100;\n\nfunction buildOffice() {\n  const walk = Array.from({ length: GH }, () => Array(GW).fill(true));\n  const interior = Array.from({ length: GH }, () => Array(GW).fill(false));\n  const wallSet = new Set(), doorSet = new Set(), lobbySet = new Set();\n  const floors = [], props = [], labels = [], robots = [], colliders = [];\n  const K = (x, y) => x + ',' + y;\n  const block = (x, y) => { if (y >= 0 && y < GH && x >= 0 && x < GW) walk[y][x] = false; };\n\n  const prop = (id, a, x, y, o = {}) => {\n    const w = o.w || a.w, h = o.h || a.h; let l, t;\n    if (o.center) { const [cx, cy] = isoC(x, y); l = cx - w / 2; t = cy - h + (o.oy != null ? o.oy : 8); }\n    else { const [px, py] = P(x, y); l = px; t = py - (h - 32); }\n    props.push({ id, src: a.src, l: Math.round(l), t: Math.round(t), w, h, z: Math.round(((o.zx != null ? o.zx : x) + (o.zy != null ? o.zy : y)) * 10 + (o.dz != null ? o.dz : 2)) });\n  };\n\n  const wallTiles = [];\n  const ring = (r, doors, key) => {\n    let di = 0;\n    for (let x = r.x; x < r.x + r.w; x++) for (let y = r.y; y < r.y + r.h; y++) {\n      const edge = x === r.x || y === r.y || x === r.x + r.w - 1 || y === r.y + r.h - 1;\n      if (!edge) { interior[y][x] = true; continue; }\n      const isDoor = doors.some(d => d[0] === x && d[1] === y);\n      if (isDoor) { doorSet.add(K(x, y)); prop('Door_' + key + (doors.length > 1 ? '_' + (++di) : ''), A.door, x, y, { dz: 3 }); }\n      else if (!wallSet.has(K(x, y))) { wallSet.add var KS='kabir_ai_keys';
function lk(){try{return JSON.parse(localStorage.getItem(KS))||{};}catch(e){return{};}}
function sk(p,v){var k=lk();k[p]=(v||'').trim();localStorage.setItem(KS,JSON.stringify(k));}
function gk(p){return(lk()[p]||'').trim();}
var AGENTS=[
 {id:'dir',name:'Dirijyor',role:'boshqaruv',model:'Gemini 2.5 Flash',provider:'google',color:'#7fd4ff'},
 {id:'str',name:'Strateg',role:'reja',model:'Gemini 2.5 Flash',provider:'google',color:'#b39ddb'},
 {id:'boz',name:'Bozorchi',role:'bozor/sotuv',model:'Gemini 2.5 Flash',provider:'google',color:'#8fc460'},
 {id:'mol',name:'Moliyachi',role:'pul-hisob',model:'GPT-5.5',provider:'openai',color:'#5dcaa5'},
 {id:'ijr',name:'Ijrochi',role:'bajarish/kod',model:'DeepSeek V4',provider:'deepseek',color:'#efb64a'},
 {id:'tan',name:'Tanqidchi',role:'nazorat',model:'Claude Opus 4.8',provider:'anthropic',color:'#e07a5a'},
 {id:'diz',name:'Dizayner',role:'dizayn/reklama',model:'Claude Opus 4.8',provider:'anthropic',color:'#f0a0c0'},
];
var active=null,lastTeam=[];
function pick(t){t=t.toLowerCase();var s={dir:1};
 [[['pul','narx','byudjet','foyda','xarajat','daromad'],'mol'],[['bozor','raqob','mijoz','sot','reklama'],'boz'],[['reja','strateg','kelaj','kengay'],'str'],[['dizayn','logo','banner','kontent'],'diz'],[['yoz','hisobla','jadval','kod','tayyorla','bajar'],'ijr']].forEach(function(r){if(r[0].some(function(k){return t.indexOf(k)>=0;}))s[r[1]]=1;});
 s.tan=1;var out=AGENTS.filter(function(a){return s[a.id];});if(out.length<3)out=AGENTS.slice(0,5).concat([AGENTS[5]]);return out;}
function sys(a){return 'Sen "'+a.name+'" — Ibrohimning AI ofisidagi robot-xodimsan. Roling: '+a.role+'. Ibrohim (BOSS) Yangiyol/Toshkentda oltin savdo va "Kabir Exclusive" mebel biznesini yuritadi. Ozbek tilida aniq, amaliy javob ber, kerak bolsa batafsil (raqam/misol), suvsiz.';}
function usr(a,task,tr){var u='Vazifa: '+task+'\n\n';if(tr.length)u+='Suhbat tarixi:\n'+tr.map(function(m){return m.name+': '+m.body;}).join('\n')+'\n\n';return u+'Sen '+a.name+' sifatida javob ber (suhbatni davom ettir).';}
function oai(url,key,a,task,tr,model,extra){var body={model:model,messages:[{role:'system',content:sys(a)},{role:'user',content:usr(a,task,tr)}]};for(var k in extra)body[k]=extra[k];return fetch(url,{method:'POST',headers:{'Authorization':'Bearer '+key,'content-type':'application/json'},body:JSON.stringify(body)});}
async function call(a,task,tr){var key=gk(a.provider);
 try{
 if(a.provider==='anthropic'&&key){var r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'x-api-key':key,'anthropic-version':'2023-06-01','content-type':'application/json','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-opus-4-8',max_tokens:700,system:sys(a),messages:[{role:'user',content:usr(a,task,tr)}]})});if(!r.ok)return'Claude xato ('+r.status+')';var d=await r.json();return d.content.map(function(b){return b.text||'';}).join('').trim();}
 if(a.provider==='openai'&&key){var r=await oai('https://api.openai.com/v1/chat/completions',key,a,task,tr,'gpt-5.5',{max_completion_tokens:2000,reasoning_effort:'low'});if(!r.ok)return'GPT xato ('+r.status+')';var d=await r.json();return((d.choices&&d.choices[0]&&d.choices[0].message.content)||'').trim()||'(GPT bosh)';}
 if(a.provider==='deepseek'&&key){var r=await oai('https://api.deepseek.com/chat/completions',key,a,task,tr,'deepseek-chat',{temperature:0.3,max_tokens:800});if(!r.ok)return'DeepSeek xato ('+r.status+')';var d=await r.json();return((d.choices&&d.choices[0]&&d.choices[0].message.content)||'').trim()||'(DeepSeek bosh)';}
 if(a.provider==='google'&&key){var r=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent',{method:'POST',headers:{'x-goog-api-key':key,'content-type':'application/json'},body:JSON.stringify({system_instruction:{parts:[{text:sys(a)}]},contents:[{role:'user',parts:[{text:usr(a,task,tr)}]}],generationConfig:{temperature:0.3,maxOutputTokens:700,thinkingConfig:{thinkingBudget:0}}})});if(!r.ok)return'Gemini xato ('+r.status+')';var d=await r.json();var p=(d.candidates&&d.candidates[0]&&d.candidates[0].content&&d.candidates[0].content.parts)||[];return p.map(function(x){return x.text||'';}).join('').trim()||'(Gemini bosh)';}
 }catch(e){return a.name+' ulanish xatosi ('+(e.message||e)+')';}
 await new Promise(function(res){setTimeout(res,500);});return a.name+': ('+a.model+' ulanmagan — namuna)';}
var conv=document.getElementById('kaiconv'),transcript=[],busy=false;
function addMsg(m){var d=document.createElement('div');d.className='msg';d.innerHTML='<div class="who" style="color:'+m.color+'">'+m.name+(m.model?' · <span style="color:#7f889b">'+m.model+'</span>':'')+'</div><div class="body"></div>';d.querySelector('.body').textContent=m.body;conv.appendChild(d);conv.scrollTop=1e9;}
async function run(task,team){busy=true;document.getElementById('kairun').disabled=true;
 for(var i=0;i<team.length;i++){var a=team[i];var e={id:a.id,name:a.name,color:a.color,body:await call(a,task,transcript),model:a.model};transcript.push(e);addMsg(e);}
 busy=false;document.getElementById('kairun').disabled=false;document.getElementById('kaifollowrow').style.display='flex';}
document.getElementById('kairun').onclick=function(){if(busy)return;var t=document.getElementById('kaitask').value.trim();if(!t)return;transcript=[];conv.innerHTML='';addMsg({name:'Ibrohim (BOSS)',color:'#efb64a',body:t,model:''});window.__kaiT=t;lastTeam=active?[active]:pick(t);run(t,lastTeam);};
document.getElementById('kaifb').onclick=function(){if(busy)return;var q=document.getElementById('kaifollow').value.trim();if(!q)return;document.getElementById('kaifollow').value='';addMsg({name:'Ibrohim (BOSS)',color:'#efb64a',body:q,model:''});transcript.push({name:'Ibrohim (BOSS)',color:'#efb64a',body:q,model:''});var team=active?[active]:(lastTeam.length?lastTeam:pick(q));run(window.__kaiT||q,team);};
document.getElementById('kainew').onclick=function(){transcript=[];conv.innerHTML='';document.getElementById('kaifollowrow').style.display='none';document.getElementById('kaitask').value='';document.getElementById('kaitask').focus();};
document.getElementById('kaifollow').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('kaifb').click();});
document.getElementById('kaitask').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('kairun').click();});
function renderTeam(){var el=document.getElementById('kaiteam');el.innerHTML='';AGENTS.forEach(function(a){var s=document.createElement('span');s.className='agent'+(active&&active.id===a.id?' on':'');s.innerHTML='<span style="color:'+a.color+'">●</span> '+a.name;s.onclick=function(){active=(active&&active.id===a.id)?null:a;renderTeam();updMode();};el.appendChild(s);});
 var all=document.createElement('span');all.className='agent'+(active?'':' on');all.textContent='◆ Hammasi';all.onclick=function(){active=null;renderTeam();updMode();};el.appendChild(all);}
function updMode(){document.getElementById('kaimode').innerHTML=active?('Rejim: 🎯 Faqat '+active.name+' ('+active.model+')'):'Rejim: 🟢 Butun kengash';document.getElementById('kairun').textContent=active?('→ '+active.name):'Yuborish';}
function refreshKeys(){document.getElementById('kaikeys').innerHTML=(gk('google')?'🟢':'⚪')+' Gemini · '+(gk('anthropic')?'🟢':'⚪')+' Claude · '+(gk('openai')?'🟢':'⚪')+' GPT · '+(gk('deepseek')?'🟢':'⚪')+' DeepSeek';}
[].forEach.call(document.querySelectorAll('#kai [data-k]'),function(b){b.onclick=function(){sk(b.dataset.k,document.getElementById(b.dataset.src).value);refreshKeys();};});
renderTeam();updMode();refreshKeys();
var panel=document.getElementById('kai'),ob=document.getElementById('kaiopen');
document.getElementById('kaihide').onclick=function(){panel.style.display='none';ob.style.display='block';};
ob.onclick=function(){panel.style.display='flex';ob.style.display='none';};
})();
</script>

</body>
